<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factor Analysis Reports Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 380px;
            background: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #2E86AB 0%, #1a5a7a 100%);
            color: white;
            border-bottom: 1px solid #236587;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .search-box {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: #2E86AB;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .folder {
            margin: 5px 0;
        }

        .folder-header {
            padding: 8px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            transition: background-color 0.2s;
        }

        .folder-header:hover {
            background-color: #f5f5f5;
        }

        .folder-icon {
            margin-right: 8px;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .folder.collapsed .folder-icon {
            transform: rotate(-90deg);
        }

        .folder-content {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .folder.collapsed .folder-content {
            max-height: 0 !important;
        }

        .file-item {
            padding: 8px 20px 8px 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #555;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .file-item:hover {
            background-color: #f0f7fb;
            border-left-color: #2E86AB;
        }

        .file-item.active {
            background-color: #e8f4f8;
            color: #2E86AB;
            font-weight: 500;
            border-left-color: #2E86AB;
        }

        .file-name {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .file-icon {
            margin-right: 8px;
            opacity: 0.6;
        }

        .file-size {
            font-size: 11px;
            color: #999;
            margin-left: 10px;
        }

        /* Content Area */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .content-header {
            padding: 15px 25px;
            background: #fafafa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content-title {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .content-title .path {
            color: #2E86AB;
            font-weight: 600;
        }

        .content-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn:hover:not(:disabled) {
            background: #f5f5f5;
            border-color: #2E86AB;
            color: #2E86AB;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .content-body {
            flex: 1;
            position: relative;
        }

        #report-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
        }

        .empty-state-hint {
            font-size: 13px;
            color: #bbb;
            margin-top: 10px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }

        /* Stats */
        .stats {
            padding: 12px 20px;
            font-size: 11px;
            color: #999;
            border-top: 1px solid #e0e0e0;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }

        .stats-label {
            font-weight: 500;
        }

        .update-notice {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
            font-size: 10px;
            color: #bbb;
            text-align: center;
        }
    </style>
</head>

        // Format file size
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Build folder structure
        function buildFolderStructure() {
            const structure = {};

            files.forEach(file => {
                const parts = file.path.split('/');
                if (parts.length === 1) {
                    // Root level file
                    if (!structure['_root']) structure['_root'] = [];
                    structure['_root'].push(file);
                } else {
                    // Nested file
                    const folder = parts[0];
                    if (!structure[folder]) structure[folder] = [];
                    structure[folder].push(file);
                }
            });

            return structure;
        }

        // Render file tree
        function renderFileTree(filterText = '') {
            const structure = buildFolderStructure();
            const treeHTML = [];
            let visibleCount = 0;

            // Render root files
            if (structure['_root']) {
                const rootFiles = structure['_root'].filter(f =>
                    !filterText || f.name.toLowerCase().includes(filterText.toLowerCase()) ||
                    f.path.toLowerCase().includes(filterText.toLowerCase())
                );
                rootFiles.forEach(file => {
                    treeHTML.push(`
                        <div class="file-item" onclick="loadReport('${file.path}', '${file.name.replace(/'/g, "\\'")}')">
                            <div class="file-name">
                                <span class="file-icon">📄</span>
                                <span>${file.name}</span>
                            </div>
                            <span class="file-size">${formatSize(file.size)}</span>
                        </div>
                    `);
                    visibleCount++;
                });
            }

            // Render folders
            const folderNames = Object.keys(structure).filter(f => f !== '_root').sort();
            folderNames.forEach(folder => {
                const folderFiles = structure[folder].filter(f =>
                    !filterText || f.name.toLowerCase().includes(filterText.toLowerCase()) ||
                    f.path.toLowerCase().includes(filterText.toLowerCase())
                );

                if (folderFiles.length === 0 && filterText) return;

                const displayName = folder.replace(/_/g, ' ').replace(/\w/g, l => l.toUpperCase());

                treeHTML.push(`
                    <div class="folder">
                        <div class="folder-header" onclick="toggleFolder(this)">
                            <span class="folder-icon">▼</span>
                            <span>📁 ${displayName} (${folderFiles.length})</span>
                        </div>
                        <div class="folder-content">
                            ${folderFiles.map(file => `
                                <div class="file-item" onclick="loadReport('${file.path}', '${file.name.replace(/'/g, "\\'")}')">
                                    <div class="file-name">
                                        <span class="file-icon">📄</span>
                                        <span>${file.name}</span>
                                    </div>
                                    <span class="file-size">${formatSize(file.size)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `);
                visibleCount += folderFiles.length;
            });

            document.getElementById('file-tree').innerHTML = treeHTML.join('');

            // Set folder content max-height for animation
            document.querySelectorAll('.folder-content').forEach(content => {
                content.style.maxHeight = content.scrollHeight + 'px';
            });

            // Update stats
            document.getElementById('total-count').textContent = files.length;
            document.getElementById('visible-count').textContent = visibleCount;
        }

        // Toggle folder
        function toggleFolder(header) {
            const folder = header.parentElement;
            folder.classList.toggle('collapsed');
        }

        // Load report
        let currentPath = '';
        function loadReport(path, name) {
            currentPath = path;
            const frame = document.getElementById('report-frame');
            const emptyState = document.getElementById('empty-state');

            frame.src = path;
            frame.style.display = 'block';
            emptyState.style.display = 'none';

            document.getElementById('current-file').innerHTML =
                `<span class="path">${name}</span>`;

            // Update active state
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.file-item').classList.add('active');

            // Enable buttons
            document.getElementById('open-btn').disabled = false;
            document.getElementById('refresh-btn').disabled = false;
        }

        // Open in new tab
        function openInNewTab() {
            if (currentPath) {
                window.open(currentPath, '_blank');
            }
        }

        // Refresh frame
        function refreshFrame() {
            const frame = document.getElementById('report-frame');
            frame.src = frame.src;
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            renderFileTree(e.target.value);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + K to focus search
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search-input').focus();
            }
            // Ctrl/Cmd + O to open in new tab
            if ((e.ctrlKey || e.metaKey) && e.key === 'o' && currentPath) {
                e.preventDefault();
                openInNewTab();
            }
        });

        // Initialize
        renderFileTree();

        console.log('%c📊 Report Portal Ready', 'color: #2E86AB; font-size: 16px; font-weight: bold;');
        console.log(`Total reports: ${files.length}`);
